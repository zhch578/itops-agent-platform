services:
  backend:
    # For local build
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    # For using pre-built images from registry:
    # image: registry.cn-hangzhou.aliyuncs.com/huluwa666/tsq-images-hub:IT_Onlin-ITOps-backend-latest
    container_name: itops-backend
    networks:
      - itops-network
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
      - DATABASE_PATH=/app/data/app.db
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set for production deployment}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-24h}
      - DOUBAO_API_KEY=${DOUBAO_API_KEY:-}
      - DOUBAO_API_BASE=${DOUBAO_API_BASE:-https://ark.cn-beijing.volces.com/api/v3}
      - DOUBAO_MODEL=${DOUBAO_MODEL:-doubao-4o}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - LOCAL_AI_API_KEY=${LOCAL_AI_API_KEY:-}
      - LOCAL_AI_API_BASE=${LOCAL_AI_API_BASE:-}
      - LOCAL_AI_MODEL=${LOCAL_AI_MODEL:-}
      - WEBHOOK_VERIFY_ENABLED=${WEBHOOK_VERIFY_ENABLED:-false}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
      - WEBHOOK_IP_WHITELIST=${WEBHOOK_IP_WHITELIST:-}
      - ALERT_EMAIL_HOST=${ALERT_EMAIL_HOST:-}
      - ALERT_EMAIL_PORT=${ALERT_EMAIL_PORT:-587}
      - ALERT_EMAIL_USER=${ALERT_EMAIL_USER:-}
      - ALERT_EMAIL_PASS=${ALERT_EMAIL_PASS:-}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO:-}
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:80,http://localhost:3000,http://localhost:8080,http://itops-frontend,http://frontend}
    volumes:
      - app-data:/app/data
      - app-backups:/app/backups
      - /var/run/docker.sock:/var/run/docker.sock
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Log driver with size limits
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    # For local build
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    # For using pre-built images from registry:
    # image: registry.cn-hangzhou.aliyuncs.com/huluwa666/tsq-images-hub:IT_Onlin-ITOps-frontend-latest
    container_name: itops-frontend
    networks:
      - itops-network
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Log driver with size limits
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

networks:
  itops-network:
    driver: bridge

volumes:
  app-data:
    driver: local
  app-backups:
    driver: local