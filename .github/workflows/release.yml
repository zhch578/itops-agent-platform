name: Release (Build & Push Docker Images)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      push_to_registry:
        description: 'Push to Aliyun registry'
        type: boolean
        default: true
      backend_tag:
        description: 'Backend image tag'
        type: string
        default: 'latest'
      frontend_tag:
        description: 'Frontend image tag'
        type: string
        default: 'latest'

env:
  ALIYUN_REGISTRY: registry.cn-hangzhou.aliyuncs.com
  ALIYUN_NAMESPACE: huluwa666
  ALIYUN_REPO: tsq-images-hub
  IMAGE_PREFIX: IT_Onlin-ITOps

jobs:
  # Phase 1: Quality Gates
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      backend_ok: ${{ steps.backend-check.outputs.ok }}
      frontend_ok: ${{ steps.frontend-check.outputs.ok }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend deps
        working-directory: ./backend
        run: npm ci

      - name: Install frontend deps
        working-directory: ./frontend
        run: npm ci

      - name: Backend TypeScript check
        working-directory: ./backend
        run: npx tsc --noEmit

      - name: Frontend TypeScript check
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Frontend build
        working-directory: ./frontend
        run: npm run build

      - name: Backend tests (non-blocking)
        working-directory: ./backend
        run: npm test --if-present
        continue-on-error: true
        env:
          JWT_SECRET: test-secret-for-ci
          DOUBAO_API_KEY: test-api-key

      - name: Set quality check results
        id: quality
        run: |
          echo "Backend: ✅ TypeScript OK"
          echo "Frontend: ✅ TypeScript OK + Build OK"
          echo "ok=true" >> $GITHUB_OUTPUT

  # Phase 2: Build and Push Backend
  build-backend:
    name: Build & Push Backend
    needs: [quality-gates]
    runs-on: ubuntu-latest
    if: always() && (github.event_name == 'workflow_dispatch' && inputs.push_to_registry || startsWith(github.ref, 'refs/tags/'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ inputs.backend_tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/${{ env.ALIYUN_REPO }}:${{ env.IMAGE_PREFIX }}-backend-latest
          labels: |
            org.opencontainers.image.title=ITOps Agent Platform Backend
            org.opencontainers.image.description=Enterprise IT Operations Multi-Agent Automation Platform - Backend API Server
            org.opencontainers.image.vendor=谭策
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.licenses=MPL-2.0
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

      - name: Verify backend image
        run: |
          echo "Backend image pushed:"
          echo "  - ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/${{ env.ALIYUN_REPO }}:${{ env.IMAGE_PREFIX }}-backend-latest"

  # Phase 3: Build and Push Frontend
  build-frontend:
    name: Build & Push Frontend
    needs: [quality-gates]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.push_to_registry || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ inputs.frontend_tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/${{ env.ALIYUN_REPO }}:${{ env.IMAGE_PREFIX }}-frontend-latest
          labels: |
            org.opencontainers.image.title=ITOps Agent Platform Frontend
            org.opencontainers.image.description=Enterprise IT Operations Multi-Agent Automation Platform - Web UI
            org.opencontainers.image.vendor=谭策
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.licenses=MPL-2.0
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify frontend image
        run: |
          echo "Frontend image pushed:"
          echo "  - ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/${{ env.ALIYUN_REPO }}:${{ env.IMAGE_PREFIX }}-frontend-latest"

  # Phase 4: Release Notes (only on tag)
  release-notes:
    name: Create Release Notes
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        id: notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "## 🚀 Release $VERSION" > release_notes.md
          echo "" >> release_notes.md
          echo "### 📦 Docker Images" >> release_notes.md
          echo "" >> release_notes.md
          echo "| Component | Image |" >> release_notes.md
          echo "|-----------|-------|" >> release_notes.md
          echo "| Backend | \`${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/${{ env.ALIYUN_REPO }}:${{ env.IMAGE_PREFIX }}-backend-latest\` |" >> release_notes.md
          echo "| Frontend | \`${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/${{ env.ALIYUN_REPO }}:${{ env.IMAGE_PREFIX }}-frontend-latest\` |" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 🚀 一键部署" >> release_notes.md
          echo "" >> release_notes.md
          echo "\`\`\`bash" >> release_notes.md
          echo "# 前提是已有docker环境，直接执行下面一键部署命令（2分钟即可自动完成部署）" >> release_notes.md
          echo "curl -sL https://gitee.com/IT_Oline/itops-agent-platform/raw/main/deploy.sh -o deploy.sh && chmod +x deploy.sh && ./deploy.sh" >> release_notes.md
          echo "\`\`\`" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 📝 Changes" >> release_notes.md
          echo "" >> release_notes.md
          # Try to get changes since last tag, fallback to recent commits
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log ${PREV_TAG}..HEAD --pretty=format:"* %s (%h)" >> release_notes.md || true
          else
            git log -20 --pretty=format:"* %s (%h)" >> release_notes.md || true
          fi
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
